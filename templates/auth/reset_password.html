{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-shell" style="min-height:auto; margin:-40px -24px;">
  <div class="auth-side" style="flex:none; width:38%;">
    <div class="ruled"></div>
    <div>
      <h1>Set a new password.</h1>
      <p class="tagline">Almost there &mdash; choose something secure.</p>
    </div>
    <div></div>
  </div>
  <div class="auth-form-wrap" style="flex:1;">
    <div class="auth-form-card">
      <h2>New password</h2>
      <p class="subtitle">Enter and confirm your new password below.</p>
      <form method="POST">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" name="password" required autofocus>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Reset password</button>
      </form>
      <p class="auth-switch"><a href="{{ url_for('auth.login') }}">Back to log in</a></p>
    </div>
  </div>
</div>
{% endblock %}
